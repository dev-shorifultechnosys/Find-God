<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">FIND GOD faith sharing illustration</title>
  <desc id="desc">A peaceful navy and gold illustration showing an open Bible, a salvation card, a cross, sunrise rays, and two people in conversation.</desc>
  <defs>
